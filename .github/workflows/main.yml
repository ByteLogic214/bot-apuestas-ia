name: Ejecucion Automatica Bot de Apuestas

on:
  schedule:
    # Se ejecutará automáticamente cada hora en punto (Formato Cron)
    - cron: '0 * * * *'
  workflow_dispatch: # Te permite activar el bot manualmente desde el celular cuando quieras

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerias necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar algoritmo analizador
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python bot.py
